name: Build & Release (Windows + macOS)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt pyinstaller pytest
      - run: python -m pytest test_app.py test_unit_converter.py -v
      - run: |
          $S = python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'static'))"
          pyinstaller --noconfirm --onefile --windowed --noupx --name LNG_PORV_Sizing `
            --add-data "app.py;." --add-data "psv_database.json;." --add-data "${S};streamlit/static" `
            --collect-all streamlit --collect-all plotly --collect-all CoolProp --collect-data pandas `
            --copy-metadata streamlit run_app.py
      - uses: actions/upload-artifact@v4
        with: {name: LNG_PORV_Sizing_Windows, path: dist/LNG_PORV_Sizing.exe, retention-days: 90}

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt pyinstaller pytest
      - run: python -m pytest test_app.py test_unit_converter.py -v
      - run: |
          S=$(python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'static'))")
          pyinstaller --noconfirm --onefile --windowed --name LNG_PORV_Sizing \
            --add-data "app.py:." --add-data "psv_database.json:." --add-data "icons/icon.icns:." \
            --add-data "${S}:streamlit/static" \
            --icon icons/icon.icns \
            --collect-all streamlit --collect-all plotly --collect-all CoolProp --collect-data pandas \
            --copy-metadata streamlit run_app.py
      - uses: actions/upload-artifact@v4
        with: {name: LNG_PORV_Sizing_macOS_Intel, path: dist/LNG_PORV_Sizing.app, retention-days: 90}

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install -r requirements.txt pyinstaller pytest
      - run: python -m pytest test_app.py test_unit_converter.py -v
      - run: |
          S=$(python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'static'))")
          pyinstaller --noconfirm --onefile --windowed --name LNG_PORV_Sizing \
            --add-data "app.py:." --add-data "psv_database.json:." --add-data "${S}:streamlit/static" \
            --collect-all streamlit --collect-all plotly --collect-all CoolProp --collect-data pandas \
            --copy-metadata streamlit run_app.py
      - uses: actions/upload-artifact@v4
        with: {name: LNG_PORV_Sizing_macOS_ARM, path: dist/LNG_PORV_Sizing.app, retention-days: 90}

  create-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos-intel, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {path: artifacts}
      - run: |
          mkdir release
          cp artifacts/LNG_PORV_Sizing_Windows/LNG_PORV_Sizing.exe release/LNG_PORV_Sizing_Windows.exe
          cp -r artifacts/LNG_PORV_Sizing_macOS_Intel/LNG_PORV_Sizing.app release/LNG_PORV_Sizing_Intel.app
          cp -r artifacts/LNG_PORV_Sizing_macOS_ARM/LNG_PORV_Sizing.app release/LNG_PORV_Sizing_ARM.app
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
          name: LNG PORV Sizing Portal ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
